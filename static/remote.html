<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Remoto — InventoPC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f1117;font-family:'Segoe UI',sans-serif;color:#e8eaf0;overflow:hidden}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:46px;background:#161b27;
  border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;padding:0 14px}
.brand{font-size:13px;font-weight:700;color:#3b82f6}
.sep{width:1px;height:18px;background:rgba(255,255,255,.1)}
.host{font-size:13px;font-weight:600}
.ip{font-size:12px;color:#8892a4;font-family:monospace}
.right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;
  background:#1e2535;border:1px solid rgba(255,255,255,.08);font-size:11px;color:#8892a4}
.dot{width:7px;height:7px;border-radius:50%;background:#f59e0b}
.dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e}
.dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dot.blink{animation:pulse 1s infinite}
.btn{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.1);
  background:#1e2535;color:#e8eaf0;font-size:12px;cursor:pointer;transition:background .15s}
.btn:hover{background:#252d3d}
.btn.red{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#ef4444;font-weight:600}
#load{position:fixed;inset:0;top:46px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:#0f1117;z-index:50}
.spinner{width:42px;height:42px;border:3px solid #1e2535;border-top-color:#3b82f6;
  border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
.ltitle{font-size:17px;font-weight:600;margin-bottom:7px}
.lsub{font-size:13px;color:#8892a4;text-align:center;max-width:380px;line-height:1.7;margin-bottom:16px}
.steps{font-size:12px;color:#556070;text-align:left;line-height:2.4}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
  border-radius:12px;padding:20px 26px;text-align:center;max-width:460px}
.err-box h3{color:#ef4444;margin-bottom:8px;font-size:15px}
.err-box p{font-size:13px;color:#8892a4;line-height:1.8}
.err-box code{background:#1e2535;padding:2px 7px;border-radius:5px;font-size:12px;color:#e8eaf0}
.retry{margin-top:14px;padding:8px 20px;border-radius:8px;
  background:#3b82f6;border:none;color:#fff;font-size:13px;cursor:pointer;font-weight:600}
#screen{position:fixed;inset:46px 0 0 0;background:#000;display:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">⬛ InventoPC</div>
  <div class="sep"></div>
  <div class="host" id="tbHost">—</div>
  <div class="ip" id="tbIp">—</div>
  <div class="right">
    <div class="pill">
      <div class="dot blink" id="dot"></div>
      <span id="stText">Conectando...</span>
    </div>
    <button class="btn" onclick="cad()">Ctrl+Alt+Del</button>
    <button class="btn" onclick="fs()">⛶ Tela cheia</button>
    <button class="btn red" onclick="disc()">✕ Fechar</button>
  </div>
</div>
<div id="load">
  <div class="spinner" id="spin"></div>
  <div class="ltitle" id="ltitle">Iniciando sessão remota...</div>
  <div class="lsub" id="lsub">Aguarde enquanto a conexão é estabelecida</div>
  <div class="steps">
    <div id="s1">⏳ Localizando o computador remoto...</div>
    <div id="s2" style="opacity:.4">⏳ Iniciando proxy de conexão...</div>
    <div id="s3" style="opacity:.4">⏳ Abrindo sessão VNC...</div>
  </div>
</div>
<div id="screen"></div>
<script type="module">
import RFB from 'https://cdn.jsdelivr.net/npm/@novnc/novnc@1.4.0/core/rfb.js';
const P=new URLSearchParams(location.search);
const CID=P.get('id'),HOST=P.get('host')||'PC Remoto',IP=P.get('ip')||'',SERVER=location.origin;
document.getElementById('tbHost').textContent=HOST;
document.getElementById('tbIp').textContent=IP;
document.title='Remoto: '+HOST;
let rfb=null;
function st(n,s){
  const el=document.getElementById('s'+n);if(!el)return;
  el.style.opacity='1';
  const ic={done:'✅',active:'🔄',error:'❌'};
  el.textContent=el.textContent.replace(/[⏳✅🔄❌]/u,ic[s]||'⏳');
  el.className=s;
}
function setStatus(type,txt){
  document.getElementById('dot').className='dot'+(type==='ok'?' ok':type==='err'?' err':' blink');
  document.getElementById('stText').textContent=txt;
}
function showErr(title,msg){
  document.getElementById('spin').style.display='none';
  document.getElementById('ltitle').textContent=title;
  document.getElementById('lsub').innerHTML=`<div class="err-box"><h3>${title}</h3><p>${msg}</p><button class="retry" onclick="location.reload()">Tentar novamente</button></div>`;
  document.querySelector('.steps').style.display='none';
  setStatus('err','Falha na conexão');
}
async function start(){
  st(1,'active');
  let wsPort;
  try{
    const r=await fetch(`${SERVER}/api/remote/start/${CID}`,{method:'POST'});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error||`HTTP ${r.status}`);
    wsPort=d.ws_port;
  }catch(e){st(1,'error');showErr('Servidor indisponível',`Não foi possível iniciar o proxy.<br><code>${e.message}</code>`);return;}
  st(1,'done');st(2,'active');
  await new Promise(r=>setTimeout(r,800));
  st(2,'done');st(3,'active');
  const wsUrl=`ws://${location.hostname}:${wsPort}`;
  try{
    const screen=document.getElementById('screen');
    rfb=new RFB(screen,wsUrl);
    rfb.scaleViewport=true;rfb.resizeSession=true;rfb.clipViewport=false;
    rfb.addEventListener('connect',()=>{
      st(3,'done');
      document.getElementById('load').style.display='none';
      document.getElementById('screen').style.display='block';
      setStatus('ok',`Conectado — ${HOST}`);
    });
    rfb.addEventListener('disconnect',e=>{
      setStatus('err','Desconectado');
      document.getElementById('screen').style.display='none';
      document.getElementById('load').style.display='flex';
      showErr('Sessão encerrada',e.detail?.reason||'Conexão encerrada pelo PC remoto.');
    });
    rfb.addEventListener('credentialsrequired',()=>{rfb.sendCredentials({password:''});});
  }catch(e){st(3,'error');showErr('Erro ao conectar VNC',`Verifique se o agente está instalado e o VNC está rodando.<br><code>${e.message}</code>`);}
}
window.cad=()=>rfb?.sendCtrlAltDel();
window.fs=()=>{const el=document.getElementById('screen');document.fullscreenElement?document.exitFullscreen():el.requestFullscreen().catch(()=>{});};
window.disc=async()=>{rfb?.disconnect();try{await fetch(`${SERVER}/api/remote/stop/${CID}`,{method:'POST'});}catch{}window.close();};
start();
</script>
</body>
</html>
